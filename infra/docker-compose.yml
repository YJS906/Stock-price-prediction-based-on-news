services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: newsalpha-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-newsalpha}
      POSTGRES_USER: ${POSTGRES_USER:-newsalpha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newsalpha}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-newsalpha} -d ${POSTGRES_DB:-newsalpha}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: newsalpha-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 2s

  api:
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    container_name: newsalpha-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://newsalpha:newsalpha@postgres:5432/newsalpha}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ENABLE_MOCK_SEED_ON_STARTUP: "true"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"

  worker:
    build:
      context: ..
      dockerfile: infra/docker/worker.Dockerfile
    container_name: newsalpha-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://newsalpha:newsalpha@postgres:5432/newsalpha}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ENABLE_MOCK_SEED_ON_STARTUP: "false"
      LOG_LEVEL: INFO

  web:
    build:
      context: ..
      dockerfile: infra/docker/web.Dockerfile
    container_name: newsalpha-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:8000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
